name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      # Publish the built dist/ as a downloadable tarball so the kiosk can bundle
      # an offline copy of Halo (kiosk-system #26). Rolling release, replaced each push.
      - name: Publish offline bundle (halo-dist.tar.gz)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar -czf halo-dist.tar.gz -C dist .
          gh release create dist-latest \
            --title "Latest kiosk offline bundle" \
            --notes "Rolling build of dist/ for kiosk offline bundling (kiosk-system #26). Auto-updated on each push to main." \
            || true
          gh release upload dist-latest halo-dist.tar.gz --clobber

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
