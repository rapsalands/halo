name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      # Publish a SELF-CONTAINED product artifact for KioskOS's generic product
      # installer: dist/ + product.yaml (self-description) + product-owned systemd
      # units + the self-updater. KioskOS reads product.yaml and wires the device
      # generically — it has no Halo-specific code. Rolling release, replaced each push.
      - name: Publish offline bundle (halo-dist.tar.gz)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pkg/dist
          cp -a dist/. pkg/dist/
          cp device/product.yaml device/halo.service device/halo-update.sh \
             device/halo-update.service device/halo-update.timer pkg/
          chmod +x pkg/halo-update.sh
          tar -czf halo-dist.tar.gz -C pkg .
          gh release create dist-latest \
            --title "Latest kiosk offline bundle" \
            --notes "Rolling product bundle (dist/ + product.yaml + units + self-updater) for KioskOS offline bundling. Auto-updated on each push to main." \
            || true
          gh release upload dist-latest halo-dist.tar.gz --clobber

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
